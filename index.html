    <!DOCTYPE html>
    <html lang="en">
    <head>

    <style>
    body {

.container{

}
.logo {
  width: 100px;

}
    .form-control{
    background-color: rgba(250, 247, 247, 0.559); 
    color: white; 
    backdrop-filter: blur(5px);

    }
.login-button{

     color: #666;

}

    <body>
    <div class="container gap-3">

        <h1 class="login-button"><bold>Login</bold></h1>
        <div class="row">
    <div class="mb-3">
<label for="username" class="form-label">User</label>
    <br>
<input  class="form-control" type="text" name="pass" id="pass" placeholder="..." required>
    </div>
    <br>

<input class="form-control" type="text" name="pass" id="pass" placeholder="..."required>
    </div>
    <div>
<label class="toggle">
  <input type="checkbox">
  <span class="slider">Stay logged in</span>
<p class="text">Your session will be saved on this device</p>
</label>
   </div>
               <div>
                <button type="button" onclick="Pass()" class="btn btn-primary">Login</button>
                <button type="reset" class="btn btn-secondary">Cancel</button>
            </div>
</div>

    <script>
        function Pass() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            if (username === 'AteneoStudent#1' && password === '#09681') {
                alert('Login successful!');

                alert('Wrong! Please try again.');
            }
        }
